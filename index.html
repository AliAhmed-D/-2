<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="موقع تحميل DiaCode" />
  <title>DiaCode</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background"></div>

  <main class="container">
    <div class="card">
      <img src="logo.png" alt="DiaCode Logo" class="logo" />
      <h1>DiaCode</h1>
      <p class="subtitle">حمّل تطبيق DiaCode مباشرة من هنا</p>

      <div class="buttons">
        <a class="btn primary" href="app-release.apk" download="DiaCode.apk">
          تحميل APK
        </a>
        <a class="btn secondary" href="https://github.com/AliAhmed-D/-2" target="_blank" rel="noopener noreferrer">
          الكود المصدري
        </a>
      </div>

      <div class="info-grid">
        <div class="info-box">
          <span>الإصدار</span>
          <strong>1.0.0</strong>
        </div>
        <div class="info-box">
          <span>الحجم</span>
          <strong>24 MB</strong>
        </div>
        <div class="info-box">
          <span>آخر تحديث</span>
          <strong>2026-04-28</strong>
        </div>
      </div>

      <p class="note">ملاحظة: قبل التثبيت، فعّل السماح بالتثبيت من مصادر غير معروفة إذا طلب الهاتف ذلك.</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
